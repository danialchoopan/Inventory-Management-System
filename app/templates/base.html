<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Inventory Management System{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/dist/font-face.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --primary-dark: #1a1d21; --accent-blue: #0d6efd; }
        body { font-family: 'Vazirmatn', sans-serif; background-color: #f0f2f5; }
        .sidebar { min-height: 100vh; background-color: var(--primary-dark); color: #fff; width: 250px; position: fixed; right: 0; top: 0; z-index: 1000; }
        .sidebar .nav-link { color: #adb5bd; border-radius: 8px; margin: 4px 15px; padding: 12px; transition: 0.3s; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background-color: rgba(255,255,255,0.1); }
        .main-content { margin-right: 250px; padding: 30px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .stat-card { background: linear-gradient(135deg, #fff 0%, #f8f9fa 100%); }
        .navbar-top { margin-right: 250px; background: #fff; border-bottom: 1px solid #eee; padding: 15px 30px; }
    </style>
</head>
<body>
    <div class="sidebar d-none" id="sidebar">
        <div class="p-4 text-center border-bottom border-secondary mb-3">
            <h5 class="mb-0">مدیریت انبار هوشمند</h5>
            <small class="text-muted">نسخه پیشرفته v2.0</small>
        </div>
        <ul class="nav flex-column" id="nav-links">
            <!-- Dynamic Links -->
        </ul>
        <div class="position-absolute bottom-0 w-100 p-3 border-top border-secondary">
            <div class="d-flex align-items-center">
                <i class="bi bi-person-circle fs-4 me-2"></i>
                <div class="overflow-hidden">
                    <div id="user-fullname" class="fw-bold small text-truncate"></div>
                    <div id="user-role" class="text-muted" style="font-size: 10px;"></div>
                </div>
                <button class="btn btn-link text-danger ms-auto p-0" onclick="logout()"><i class="bi bi-box-arrow-left fs-5"></i></button>
            </div>
        </div>
    </div>

    <div id="app-content">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
