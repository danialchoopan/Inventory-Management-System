{% extends "base.html" %}
{% block content %}
<div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>پنل صندوق‌دار (POS)</h2>
        <div class="input-group w-50">
            <span class="input-group-text"><i class="bi bi-barcode-scan"></i></span>
            <input type="text" class="form-control" placeholder="اسکن بارکد یا جستجوی کالا...">
        </div>
    </div>
    <div class="row">
        <div class="col-md-8">
            <div class="card p-4">
                <h5>سبد فروش آنی</h5>
                <table class="table mt-3">
                    <thead><tr><th>کالا</th><th>تعداد</th><th>قیمت واحد</th><th>جمع</th><th></th></tr></thead>
                    <tbody>
                        <tr><td>لپ‌تاپ ایسوس</td><td>۱</td><td>۶۵,۰۰۰,۰۰۰</td><td>۶۵,۰۰۰,۰۰۰</td><td><i class="bi bi-trash text-danger"></i></td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-4 bg-light">
                <h5>خلاصه فاکتور</h5>
                <hr>
                <div class="d-flex justify-content-between mb-2"><span>جمع کل:</span><strong>۶۵,۰۰۰,۰۰۰</strong></div>
                <div class="d-flex justify-content-between mb-4"><span>مالیات (۹٪):</span><strong>۵,۸۵۰,۰۰۰</strong></div>
                <h4 class="text-primary text-center mb-4">۷۰,۸۵۰,۰۰۰ تومان</h4>
                <button class="btn btn-success w-100 btn-lg mb-2">تسویه و چاپ فاکتور</button>
                <button class="btn btn-outline-secondary w-100">تعلیق سفارش</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
