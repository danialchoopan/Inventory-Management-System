{% extends "base.html" %}

{% block content %}

<div class="card mt-4">
    <div class="card-body">
        <h5 class="card-title">فروش محصول</h5>
        <table class="table mt-3">
            <thead>
                <tr>
                    <th>نام</th>
                    <th>قیمت</th>

            <tbody id="product-sale-list"></tbody>

{% endblock %}
{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', () => { loadProductsForSale(); });
</script>
{% endblock %}
