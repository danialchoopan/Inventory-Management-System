{% extends "base.html" %}
{% block title %}ورود به سیستم{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card mt-5">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">ورود به سیستم</h3>
                <form id="login-form">
                    <div class="mb-3">
                        <label for="username" class="form-label">نام کاربری</label>
                        <input type="text" class="form-control" id="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">رمز عبور</label>
                        <input type="password" class="form-control" id="password" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">ورود</button>
                    </div>
                </form>
                <div id="login-error" class="alert alert-danger mt-3 d-none"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const success = await login(
            document.getElementById('username').value,
            document.getElementById('password').value
        );
        if (!success) {
            const errorDiv = document.getElementById('login-error');
            errorDiv.textContent = 'نام کاربری یا رمز عبور اشتباه است';
            errorDiv.classList.remove('d-none');
        }
    });
</script>
{% endblock %}
